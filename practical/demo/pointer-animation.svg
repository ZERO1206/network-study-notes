<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Courier New', monospace" font-size="16">
  <defs>
    <style>
      @keyframes s1 {
        0%,  6%  { opacity: 1; }
        22%, 100% { opacity: 0; }
      }
      @keyframes s2 {
        0%,  25% { opacity: 0; }
        29%, 46% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes s3 {
        0%,  53% { opacity: 0; }
        57%, 72% { opacity: 1; }
        76%, 100% { opacity: 0; }
      }
      @keyframes s4 {
        0%,   78% { opacity: 0; }
        85%, 100% { opacity: 1; }
      }
      .lb { font-family:Arial; font-size:14px; font-weight:bold; }
      .cd { font-size:20px; letter-spacing:1px; }
      .pl { font-size:12px; font-weight:bold; }
      .tx { font-family:Arial; font-size:13px; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="340" fill="#1e1e1e" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="26" text-anchor="middle" fill="#ffd700" font-size="14" font-family="Arial" font-weight="bold">指针移动可视化 — 循环播放中（14秒/周期）</text>

  <!-- 代码字符串（始终显示） -->
  <text x="20" y="52" class="lb" fill="#64b5f6">buf →</text>
  <text x="20" y="78" class="cd" fill="#f8f8f8">
    <tspan fill="#4fc3f7">GET</tspan> /index.html HTTP/1.1
  </text>

  <!-- 第1步：path 跳过 "GET" -->
  <g style="animation: s1 14s ease-in-out infinite">
    <!-- path 站在 G 上 -->
    <text x="20" y="104" class="pl" fill="#ff9800">path</text>
    <line x1="24" y1="108" x2="24" y2="94" stroke="#ff9800" stroke-width="2"/>
    <polygon points="24,94 20,100 28,100" fill="#ff9800"/>

    <!-- 虚线箭头：path 扫描 "GET" 到第一个空格 -->
    <line x1="24" y1="112" x2="58" y2="94" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="58,94 54,100 62,100" fill="#ff9800"/>

    <text x="80" y="100" class="tx" fill="#e0e0e0">第1步：path 逐个字符扫描 "GET"，遇到</text>
    <text x="80" y="118" class="tx" fill="#e0e0e0">第一个空格停下 ✓</text>
  </g>

  <!-- 第2步：path 跳过空格站到 / -->
  <g style="animation: s2 14s ease-in-out infinite">
    <text x="58" y="104" class="pl" fill="#4caf50">path</text>
    <line x1="62" y1="108" x2="62" y2="94" stroke="#4caf50" stroke-width="2"/>
    <polygon points="62,94 58,100 66,100" fill="#4caf50"/>

    <line x1="62" y1="112" x2="84" y2="94" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="84,94 80,100 88,100" fill="#4caf50"/>

    <text x="110" y="100" class="tx" fill="#e0e0e0">第2步：path 跳过空格，站到 '/' 位置</text>
    <text x="110" y="118" class="tx" fill="#e0e0e0">这就是请求路径的起点 ✓</text>
  </g>

  <!-- 第3步：end 从 / 走到第二个空格 -->
  <g style="animation: s3 14s ease-in-out infinite">
    <!-- 两个指针并排站在 / 上 -->
    <text x="84" y="140" class="pl" fill="#ff9800">path</text>
    <line x1="88" y1="144" x2="88" y2="94" stroke="#ff9800" stroke-width="2"/>
    <polygon points="88,94 84,100 92,100" fill="#ff9800"/>

    <text x="84" y="158" class="pl" fill="#e91e63">end</text>
    <line x1="88" y1="162" x2="88" y2="94" stroke="#e91e63" stroke-width="2"/>
    <polygon points="88,94 84,100 92,100" fill="#e91e63"/>

    <!-- end 从 / 扫描到第二个空格 -->
    <line x1="88" y1="166" x2="266" y2="94" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="266,94 262,100 270,100" fill="#e91e63"/>

    <text x="280" y="140" class="tx" fill="#e0e0e0">第3步：end 从 '/' 出发，</text>
    <text x="280" y="158" class="tx" fill="#e0e0e0">逐个字符扫描到第二个空格停下 ✓</text>
  </g>

  <!-- 第4步：截断后的结果（停留3秒） -->
  <g style="animation: s4 14s ease-in-out infinite">
    <line x1="20" y1="190" x2="780" y2="190" stroke="#555" stroke-width="1"/>

    <text x="20" y="212" class="lb" fill="#4caf50">*end = '\0' 截断后 →</text>

    <!-- 截断后的 buf -->
    <text x="20" y="242" class="cd" fill="#f8f8f8">
      <tspan fill="#4fc3f7">GET</tspan> /index.html
      <tspan fill="#ff5252">█</tspan>
      HTTP/1.1...
    </text>

    <!-- path 指向的范围高亮 -->
    <rect x="58" y="226" width="198" height="20" fill="#4caf50" opacity="0.12" rx="3"/>

    <!-- 指针标注 -->
    <text x="84" y="272" class="pl" fill="#4caf50">path →</text>
    <line x1="88" y1="276" x2="88" y2="246" stroke="#4caf50" stroke-width="2"/>
    <polygon points="88,246 84,252 92,252" fill="#4caf50"/>

    <!-- 说明 -->
    <text x="280" y="270" class="tx" fill="#e0e0e0">/index.html — 23 字节，原地截断，零拷贝</text>
    <text x="280" y="290" class="tx" fill="#ff5252">\0 在此处截断字符串，右边内容被"隐藏"</text>
  </g>

  <!-- 底部提示 -->
  <text x="780" y="330" text-anchor="end" fill="#555" font-size="11" font-family="Arial">14秒/周期 · 最后一帧停留3秒</text>
</svg>